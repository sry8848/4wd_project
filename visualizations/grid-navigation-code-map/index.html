<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>小车网格导航交互式代码地图</title>
  </head>
  <body>
    <header class="page-header">
      <div class="intro-copy">
        <h1>小车网格导航交互式代码地图</h1>
        <p>从 <code>GridNavigator.navigate()</code> 出发，沿真实调用理解 A* 重规划、单边循迹、障碍确认、倒车恢复与硬件安全停车。</p>
      </div>

      <div class="canvas-controls" role="group" aria-label="画布缩放控件">
        <button id="zoom-in" type="button">放大</button>
        <button id="zoom-out" type="button">缩小</button>
        <button id="reset-view" type="button">复位</button>
      </div>

      <ul class="legend" aria-label="图例">
        <li><span class="legend-swatch legend-swatch--root"></span>顶层目录</li>
        <li><span class="legend-swatch legend-swatch--directory"></span>子目录</li>
        <li><span class="legend-swatch legend-swatch--file"></span>文件</li>
        <li><span class="legend-swatch legend-swatch--method"></span>方法</li>
        <li><span class="legend-line"></span>确定调用</li>
        <li><span class="legend-line legend-line--conditional"></span>条件调用</li>
        <li><span class="legend-line legend-line--error"></span>异常路径</li>
      </ul>

      <p class="usage-hint">点击方法展开详情，使用“查看入线 / 查看出线”聚焦当前已绘制的调用线；点击逻辑中的方法名可跳转到目标，点击箭头可反向追溯来源，按 Esc 返回跳转前的方法。所有已展开方法都会保留调用线；普通滚轮上下移动画布，Alt + 滚轮缩放，复位可回到入口视图。</p>
    </header>

    <aside id="error-panel" role="alert" aria-live="assertive" hidden></aside>
    <main id="app" class="canvas-viewport" aria-label="功能代码结构图"></main>

    <noscript>此页面需要启用 JavaScript 才能显示交互式代码结构图。</noscript>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
