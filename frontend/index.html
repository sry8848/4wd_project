<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4WD 小车打车演示</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path d="M3 11.5 12 4l9 7.5" />
        <path d="M5.5 10.5V20h13v-9.5" />
        <path d="M9.5 20v-6h5v6" />
      </symbol>
      <symbol id="icon-obstacle" viewBox="0 0 24 24">
        <path d="M12 3 2.8 20h18.4L12 3Z" />
        <path d="M12 9v5" />
        <path d="M12 17.5h.1" />
      </symbol>
      <symbol id="icon-car" viewBox="0 0 24 24">
        <path d="M5 15h14l-1.6-5.2A2.5 2.5 0 0 0 15 8H9a2.5 2.5 0 0 0-2.4 1.8L5 15Z" />
        <path d="M4 15v3h16v-3" />
        <path d="M7 18.5h.1" />
        <path d="M17 18.5h.1" />
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24">
        <path d="M4 7v5h5" />
        <path d="M5 12a7 7 0 1 0 2-5" />
      </symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24">
        <path d="M12 21s7-5.4 7-11a7 7 0 0 0-14 0c0 5.6 7 11 7 11Z" />
        <circle cx="12" cy="10" r="2.4" />
      </symbol>
    </svg>

    <header class="topbar">
      <a class="logo" href="#home" data-view-link="home" aria-label="4WD 首页">4WD</a>
      <nav class="nav-tabs" aria-label="主导航">
        <a class="nav-tab active" href="#home" data-view-link="home">
          <svg><use href="#icon-home"></use></svg>
          首页
        </a>
        <a class="nav-tab" href="#obstacles" data-view-link="obstacles">
          <svg><use href="#icon-obstacle"></use></svg>
          障碍记录
        </a>
      </nav>
    </header>

    <main class="app-shell">
      <section id="homeView" class="page-view active" aria-label="4WD 小车打车首页">
        <aside class="request-panel">
          <div class="request-card">
            <div class="request-head">
              <h1>呼叫小车</h1>
              <div id="carMetric" class="car-metric idle" aria-label="小车实时位置">
                <svg><use href="#icon-car"></use></svg>
                <strong id="carPositionText">C3</strong>
              </div>
            </div>

            <form id="rideForm" class="ride-form">
              <label class="field-row passenger-field" for="passengerSelect">
                <span class="route-node passenger-node" aria-hidden="true">人</span>
                <span class="field-body">
                  <span class="field-label">乘客</span>
                  <select id="passengerSelect" required>
                    <option value="">请选择乘客</option>
                  </select>
                </span>
              </label>

              <label id="startField" class="field-row route-field start-field active">
                <span class="route-node route-circle" aria-hidden="true"></span>
                <span class="field-body">
                  <span class="field-label">起点</span>
                  <input id="startInput" type="text" value="A1" list="gridPoints" autocomplete="off" />
                </span>
              </label>

              <div id="waypointList" class="waypoint-list" aria-label="途径点列表"></div>

              <div id="endField" class="field-row route-field end-field">
                <span class="route-node route-square" aria-hidden="true"></span>
                <label class="field-body" for="endInput">
                  <span class="field-label">终点</span>
                  <input id="endInput" type="text" value="E5" list="gridPoints" autocomplete="off" />
                </label>
                <button id="addWaypointButton" class="add-waypoint-button" type="button" aria-label="添加途径点">+</button>
              </div>

              <datalist id="gridPoints"></datalist>

              <div class="form-actions">
                <button id="callButton" class="primary-button" type="submit">
                  <span class="button-icon" aria-hidden="true">▣</span>
                  叫车
                </button>
                <button id="resetButton" class="secondary-button" type="button">
                  <span class="button-icon" aria-hidden="true">↻</span>
                  重置
                </button>
              </div>

              <section id="pickupActionPanel" class="pickup-action-panel" hidden aria-live="polite">
                <p id="pickupActionStatus"></p>
                <img id="faceVerificationImage" alt="本次乘客人脸核验照片" hidden />
                <div class="pickup-action-buttons">
                  <button id="retryFaceButton" class="primary-button" type="button" hidden>重新识别</button>
                  <button id="confirmBoardingButton" class="primary-button" type="button" hidden>确认上车</button>
                </div>
              </section>
            </form>

          </div>
        </aside>

        <section class="message-panel" aria-label="小车消息">
          <div class="section-heading">
            <p>4WD Dispatch</p>
            <h2>小车消息</h2>
          </div>

          <div class="message-current">
            <span id="messageType">系统</span>
            <strong id="messageText">等待小车上报位置。</strong>
          </div>

          <ol id="messageList" class="message-list" aria-label="消息列表"></ol>
        </section>

        <section class="map-panel" aria-label="5x5 点位地图">
          <div class="map-header">
            <div>
              <p>Grid map</p>
              <h2 id="routeTitle">A1 → E5</h2>
            </div>
            <span id="etaText" class="eta-pill">待开始</span>
          </div>

          <div class="grid-map">
            <svg id="routeSvg" class="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <polyline id="routePolyline" points="" />
              <polyline id="progressPolyline" points="" />
            </svg>
            <div id="gridLines" class="grid-lines"></div>
            <div id="gridPointsLayer" class="grid-points-layer"></div>
            <div id="carMarker" class="car-marker" aria-label="小车当前位置">
              <span class="car-heading-indicator" aria-hidden="true">
                <svg viewBox="0 0 72 72" preserveAspectRatio="none">
                  <polyline points="19,10 36,2 53,10"></polyline>
                </svg>
              </span>
              <svg><use href="#icon-car"></use></svg>
            </div>
          </div>

          <div class="map-legend">
            <span><i class="legend-start"></i>起点</span>
            <span><i class="legend-end"></i>终点</span>
            <span><i class="legend-car"></i>小车实时位置</span>
          </div>
        </section>
      </section>

      <section id="obstacleView" class="page-view obstacle-view" aria-label="障碍记录">
        <div class="obstacle-page">
          <div class="obstacle-page-head">
            <div>
              <p class="kicker">Obstacle records</p>
              <h1>障碍记录</h1>
              <p class="muted">展示障碍类型、颜色、收费站编号、处理结果和识别现场照片。</p>
            </div>
            <button class="secondary-button" id="refreshObstaclesButton" type="button">刷新记录</button>
          </div>
          <div id="obstacleList" class="obstacle-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
